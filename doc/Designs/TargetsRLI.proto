syntax = "proto3";

import "DbHeader.proto";

package Rls;


// Документ описывает получение клиентом "снимков" целей (трасс) от устройства РЛС "Глобус" (См. пункты: "Данные от сервера к клиентам" (п.6.1, п.6.2))


// Приоритет цели (рассчитывается логикой обработки данных от РЛС – например драйвером или другим ПО)
enum TargetPriority 
{
    None      = 0;  // Нет приоритета (не определен)
    Normal    = 1;  // Обычная цель
    Alarming  = 2;  // Тревожная цель
    Dangerous = 3;  // Опасная цель
    Critical  = 4;  // Критическая цель
    Archive   = 5;  // Архивная цель 
}

// Точка цели в пространстве - координаты цели полученные при сканировании (п.6.1, п.6.2)
message TargetPoint 
{
    double distance_m   = 1;  // Расстояние до цели в метрах
    double azimuth_rad  = 2;  // Азимут в радианах (горизонтальный угол)
    double speed_mps    = 3;  // Скорость цели в метрах в секунду (радиальная)
    double height_m     = 4;  // Высота цели в метрах
    double magnitude    = 5;  // Амплитуда отраженного сигнала (безразмерная величина – смотри заголовок п.6.2.)
    uint64 time_utc_ms  = 6;  // Время обнаружения в UTC
}

// Трасса (цель) - сопровождаемый воздушный объект (п.6.2 – каждая трасса имеет уникальный ID и содержит текущую позицию цели)
message Target 
{
    // Уникальный идентификатор трассы (от 0 до 2147483647)
    oneof track_id_oneof  
    { 
        sint32 track_id = 1; 
    }
    
    // Актуальная (последняя) точка трассы с координатами цели
    oneof current_oneof   
    { 
        TargetPoint current = 2; 
    }
    
    // Приоритет цели (определяется автоматически или вручную  – например драйвером или другим ПО)
    oneof priority_oneof  
    { 
        TargetPriority priority = 3; 
    }
}

// Снимок РЛИ от устройства РЛС "Глобус"  (п.6.2)
message TargetsRLI 
{
    // UUID устройства РЛС, от которого получены данные
    oneof device_uuid_oneof 
    { 
        bytes device_uuid = 1; 
    }
    
    // Список всех активных трасс (целей) в текущий момент времени
    repeated Target targets = 2;
    
    // История обработки сообщения
    repeated Db.History history = 3;
}


